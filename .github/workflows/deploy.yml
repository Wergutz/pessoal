name: Deploy para eletronicagw.com.br/agenda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Deploy via SSH (rsync) para Hostinger
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: 147.93.38.158
          REMOTE_USER: u278289683
          REMOTE_PORT: 65002
          SOURCE: agenda/
          TARGET: ~/domains/eletronicagw.com.br/public_html/agenda/
          EXCLUDE: ".git"
