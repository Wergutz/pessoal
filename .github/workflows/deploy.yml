name: Deploy Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Conectar na Hostinger e atualizar
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 65002

          script: |
            cd /home/u278289683/domains/eletronicagw.com.br/public_html

            mkdir -p agenda

            cd agenda

            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/Wergutz/pessoal.git .
            else
              git pull origin main
            fi
